<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shader Color Elevation Map VR</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.75);
      padding: 12px;
      border-radius: 10px;
      width: 240px;
    }

    #ui .row {
      margin-bottom: 10px;
    }

    #ui label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }

    #ui select {
      width: 100%;
      box-sizing: border-box;
      padding: 4px;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.132.2/build/three.module.js",
        "OrbitControls": "https://unpkg.com/three@0.132.2/examples/jsm/controls/OrbitControls.js",
        "VRButton": "https://unpkg.com/three@0.132.2/examples/jsm/webxr/VRButton.js"
      }
    }
  </script>
</head>

<body>
  <div id="ui">
    <div class="row">
      <label for="modeSelect">Color Space</label>
      <select id="modeSelect">
        <option value="0">RGB</option>
        <option value="1">HSV</option>
        <option value="2">CIEXYZ</option>
        <option value="3">CIExyY</option>
        <option value="4">CIELAB</option>
        <option value="5">CIELCH</option>
      </select>
    </div>

    <div class="row">
      <label for="channelSelect">Elevation Channel</label>
      <select id="channelSelect"></select>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'OrbitControls';
    import { VRButton } from 'VRButton';
    import { shaderFunctions } from './main.js';

    const modeSelect = document.getElementById('modeSelect');
    const channelSelect = document.getElementById('channelSelect');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );

    camera.position.set(1.8, 1.6, 1.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });

    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);

    renderer.xr.enabled = true;

    document.body.appendChild(renderer.domElement);

    document.body.appendChild(VRButton.createButton(renderer));

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const world = new THREE.Group();
    scene.add(world);

    const grid = new THREE.GridHelper(3, 10, 0x666666, 0x333333);
    grid.position.y = -0.5;
    world.add(grid);

    function Frame() {
      const frame = new THREE.Group();

      const axes = new THREE.AxesHelper(1.3);
      axes.position.set(0.5, -0.5, -0.5);
      axes.rotation.y = Math.PI;
      axes.rotation.x = Math.PI / 2;
      frame.add(axes);

      const box = new THREE.Box3Helper(
        new THREE.Box3(
          new THREE.Vector3(-0.5, -0.5, -0.5),
          new THREE.Vector3(0.5, 0.5, 0.5)
        ),
        0xcccccc
      );

      frame.add(box);

      return frame;
    }

    world.add(Frame());

    const texture = new THREE.TextureLoader().load('Media/grenouille-gaus.jpg');

    texture.minFilter = THREE.LinearFilter;
    texture.magFilter = THREE.LinearFilter;
    texture.generateMipmaps = false;

    const heightMaterial = new THREE.ShaderMaterial({
      uniforms: {
        uTexture: { value: texture },
        uMode: { value: 0 },
        uChannel: { value: 0 },

        uLightDirection: { value: new THREE.Vector3(0.4, 0.7, 1.0).normalize() },
        uAmbient: { value: 0.35 },
        uLightStrength: { value: 0.85 },

        uSampleStep: { value: new THREE.Vector2(1.0 / 220.0, 1.0 / 220.0) }
      },

      vertexShader: `
        uniform int uChannel;
        uniform vec2 uSampleStep;

        varying vec3 vColor;
        varying vec3 vNormal;

        ${shaderFunctions}

        float getSelectedChannel(vec3 value) {
          if (uChannel == 0) return value.x;
          if (uChannel == 1) return value.y;
          return value.z;
        }

        float getHeightAt(vec2 uvValue) {
          vec2 safeUV = clamp(uvValue, vec2(0.0), vec2(1.0));

          vec3 rgb = sampleRGB(safeUV);
          vec3 value = getColorSpaceValue(rgb);

          float h = getSelectedChannel(value);

          return h * 0.8 - 0.4;
        }

        void main() {
          vec3 rgb = sampleRGB(uv);
          vColor = srgbToLinear(rgb);

          float h = getHeightAt(uv);

          vec3 pos = vec3(
            uv.x - 0.5,
            uv.y - 0.5,
            h
          );

          float hLeft  = getHeightAt(uv - vec2(uSampleStep.x, 0.0));
          float hRight = getHeightAt(uv + vec2(uSampleStep.x, 0.0));
          float hDown  = getHeightAt(uv - vec2(0.0, uSampleStep.y));
          float hUp    = getHeightAt(uv + vec2(0.0, uSampleStep.y));

          vec3 tangentX = vec3(2.0 * uSampleStep.x, 0.0, hRight - hLeft);
          vec3 tangentY = vec3(0.0, 2.0 * uSampleStep.y, hUp - hDown);

          vec3 objectNormal = normalize(cross(tangentX, tangentY));

          vNormal = normalize(normalMatrix * objectNormal);

          gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        }
      `,

      fragmentShader: `
        uniform vec3 uLightDirection;
        uniform float uAmbient;
        uniform float uLightStrength;

        varying vec3 vColor;
        varying vec3 vNormal;

        void main() {
          vec3 normal = normalize(vNormal);

          if (!gl_FrontFacing) {
            normal = -normal;
          }

          vec3 lightDir = normalize(uLightDirection);

          float lambert = max(dot(normal, lightDir), 0.0);

          float light = uAmbient + lambert * uLightStrength;

          vec3 finalColor = vColor * light;

          gl_FragColor = vec4(finalColor, 1.0);
        }
      `,

      side: THREE.DoubleSide
    });

    const heightGeometry = new THREE.PlaneGeometry(1, 1, 220, 220);
    const heightMesh = new THREE.Mesh(heightGeometry, heightMaterial);

    heightMesh.rotation.x = -Math.PI / 2;
    heightMesh.frustumCulled = false;

    world.add(heightMesh);

    const channelLabels = [
      ['R', 'G', 'B'],
      ['H', 'S', 'V'],
      ['X', 'Y', 'Z'],
      ['x', 'y', 'Y'],
      ['L*', 'a*', 'b*'],
      ['L*', 'C*', 'h']
    ];

    function updateChannelOptions() {
      const mode = parseInt(modeSelect.value);
      const labels = channelLabels[mode];

      channelSelect.innerHTML = '';

      for (let i = 0; i < labels.length; i++) {
        const option = document.createElement('option');

        option.value = i;
        option.textContent = labels[i];

        channelSelect.appendChild(option);
      }

      channelSelect.value = '0';
    }

    function updateMode() {
      const mode = parseInt(modeSelect.value);

      heightMaterial.uniforms.uMode.value = mode;

      updateChannelOptions();
      updateChannel();
    }

    function updateChannel() {
      const channel = parseInt(channelSelect.value);

      heightMaterial.uniforms.uChannel.value = channel;
    }

    modeSelect.addEventListener('change', updateMode);
    channelSelect.addEventListener('change', updateChannel);

    updateMode();

    function animate() {
      controls.update();

      renderer.render(scene, camera);
    }

    renderer.setAnimationLoop(animate);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();

      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
