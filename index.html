<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robot in the Kitchen - Three.js</title>
  <style>
    /* Basic reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f9;
      color: #333;
      line-height: 1.6;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    header h1 {
      font-size: 2.5em;
      color: #4CAF50;
    }

    /* Styling for the exercise links */
    .exercise-links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .exercise-links a {
      text-decoration: none;
      background-color: #4CAF50;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 1.2em;
      transition: background-color 0.3s;
    }

    .exercise-links a:hover {
      background-color: #45a049;
    }

    /* Adding some space at the bottom */
    footer {
      text-align: center;
      margin-top: 30px;
      font-size: 1em;
      color: #777;
    }
  </style>
</head>
<body>
  <header>
    <h1>Color and Elevation map</h1>
  </header>
  
  <div class="exercise-links">
    <a href="Excercise1.html" target="_blank">Exercise 1</a>
    <a href="Excercise2.html" target="_blank">Exercise 2</a>
    <a href="Excercise3.html" target="_blank">Exercise 3</a>
  </div>

</body>
</html>
