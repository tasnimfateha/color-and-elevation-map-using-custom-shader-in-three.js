<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shader Color Elevation Map</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.75);
      padding: 12px;
      border-radius: 10px;
      width: 240px;
    }

    #ui .row {
      margin-bottom: 10px;
    }

    #ui label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }

    #ui select {
      width: 100%;
      box-sizing: border-box;
      padding: 4px;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.132.2/build/three.module.js",
        "OrbitControls": "https://unpkg.com/three@0.132.2/examples/jsm/controls/OrbitControls.js"
      }
    }
  </script>
</head>

<body>
  <div id="ui">
    <div class="row">
      <label for="modeSelect">Color Space</label>
      <select id="modeSelect">
        <option value="0">RGB</option>
        <option value="1">HSV</option>
        <option value="2">CIEXYZ</option>
        <option value="3">CIExyY</option>
        <option value="4">CIELAB</option>
        <option value="5">CIELCH</option>
      </select>
    </div>

    <div class="row">
      <label for="channelSelect">Elevation Channel</label>
      <select id="channelSelect"></select>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'OrbitControls';
    import { shaderFunctions } from './main.js';

    const modeSelect = document.getElementById('modeSelect');
    const channelSelect = document.getElementById('channelSelect');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(1.8, 1.6, 1.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const grid = new THREE.GridHelper(3, 10, 0x666666, 0x333333);
    grid.position.y = -0.5;
    scene.add(grid);

    function Frame() {
      const frame = new THREE.Group();

      const axes = new THREE.AxesHelper(1.3);
      axes.position.set(0.5, -0.5, -0.5);
      axes.rotation.y = Math.PI;
      axes.rotation.x = Math.PI / 2;
      frame.add(axes);

      const box = new THREE.Box3Helper(
        new THREE.Box3(
          new THREE.Vector3(-0.5, -0.5, -0.5),
          new THREE.Vector3(0.5, 0.5, 0.5)
        ),
        0xcccccc
      );
      frame.add(box);

      return frame;
    }

    scene.add(Frame());

    const texture = new THREE.TextureLoader().load('Media/grenouille-gaus.jpg');
    texture.minFilter = THREE.LinearFilter;
    texture.magFilter = THREE.LinearFilter;
    texture.generateMipmaps = false;

    const heightMaterial = new THREE.ShaderMaterial({
      uniforms: {
        uTexture: { value: texture },
        uMode: { value: 0 },
        uChannel: { value: 0 }
      },
      vertexShader: `
        uniform int uChannel;
        varying vec3 vColor;

        ${shaderFunctions}

        float getSelectedChannel(vec3 value) {
          if (uChannel == 0) return value.x;
          if (uChannel == 1) return value.y;
          return value.z;
        }

        void main() {
          vec3 rgb = sampleRGB(uv);
          vColor = srgbToLinear(rgb);

          vec3 value = getColorSpaceValue(rgb);
          float h = getSelectedChannel(value);

          vec3 pos = vec3(
            uv.x - 0.5,
            uv.y - 0.5,
            h * 0.8 - 0.4
          );

          gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        }
      `,
      fragmentShader: `
        varying vec3 vColor;

        void main() {
          gl_FragColor = vec4(vColor, 1.0);
        }
      `,
      side: THREE.DoubleSide
    });

    const heightGeometry = new THREE.PlaneGeometry(1, 1, 220, 220);
    const heightMesh = new THREE.Mesh(heightGeometry, heightMaterial);

    heightMesh.rotation.x = -Math.PI / 2;
    heightMesh.frustumCulled = false;

    scene.add(heightMesh);

    const channelLabels = [
      ['R', 'G', 'B'],
      ['H', 'S', 'V'],
      ['X', 'Y', 'Z'],
      ['x', 'y', 'Y'],
      ['L*', 'a*', 'b*'],
      ['L*', 'C*', 'h']
    ];

    function updateChannelOptions() {
      const mode = parseInt(modeSelect.value);
      const labels = channelLabels[mode];

      channelSelect.innerHTML = '';

      for (let i = 0; i < labels.length; i++) {
        const option = document.createElement('option');
        option.value = i;
        option.textContent = labels[i];
        channelSelect.appendChild(option);
      }

      channelSelect.value = '0';
    }

    function updateMode() {
      const mode = parseInt(modeSelect.value);

      heightMaterial.uniforms.uMode.value = mode;

      updateChannelOptions();
      updateChannel();
    }

    function updateChannel() {
      const channel = parseInt(channelSelect.value);

      heightMaterial.uniforms.uChannel.value = channel;
    }

    modeSelect.addEventListener('change', updateMode);
    channelSelect.addEventListener('change', updateChannel);

    updateMode();

    function animate() {
      requestAnimationFrame(animate);

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();

      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
