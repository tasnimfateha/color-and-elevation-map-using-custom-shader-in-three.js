<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shader Point Cloud and Density Cloud</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
    }

    canvas {
      display: block;
    }

    #ui {
      position: absolute;
      top: 15px;
      left: 15px;
      color: white;
      background: rgba(0, 0, 0, 0.75);
      padding: 10px 12px;
      border-radius: 8px;
      z-index: 10;
    }

    #ui label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    #ui select {
      font-size: 14px;
      padding: 4px 6px;
      margin-bottom: 8px;
    }

    #status {
      font-size: 13px;
      opacity: 0.9;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.132.2/build/three.module.js",
        "OrbitControls": "https://unpkg.com/three@0.132.2/examples/jsm/controls/OrbitControls.js"
      }
    }
  </script>
</head>

<body>
  <div id="ui">
    <label for="modeSelect">Color Space</label>
    <select id="modeSelect">
      <option value="0">RGB</option>
      <option value="1">HSV</option>
      <option value="2">CIEXYZ</option>
      <option value="3">CIExyY</option>
      <option value="4">CIELAB</option>
      <option value="5">CIELCH</option>
    </select>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'OrbitControls';
    import { shaderFunctions } from './main.js';

    const modeSelect = document.getElementById('modeSelect');

    // scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    // camera
    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );

    camera.position.set(1.8, 1.6, 1.8);

    // renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    // grid
    const grid = new THREE.GridHelper(3, 10, 0x666666, 0x333333);
    grid.position.y = -0.5;
    scene.add(grid);

    // frame function
    function Frame() {
      const frame = new THREE.Group();

      const axes = new THREE.AxesHelper(1.3);
      axes.position.set(0.5, -0.5, -0.5);
      axes.rotation.y = Math.PI;
      axes.rotation.x = Math.PI / 2;
      frame.add(axes);

      const box = new THREE.Box3Helper(
        new THREE.Box3(
          new THREE.Vector3(-0.5, -0.5, -0.5),
          new THREE.Vector3(0.5, 0.5, 0.5)
        ),
        0xcccccc
      );

      frame.add(box);

      return frame;
    }

    // left side point cloud
    const pointViewGroup = new THREE.Group();
    pointViewGroup.position.x = -0.75;
    pointViewGroup.add(Frame());
    scene.add(pointViewGroup);

    // right side density cloud
    const densityViewGroup = new THREE.Group();
    densityViewGroup.position.x = 0.75;
    densityViewGroup.add(Frame());
    scene.add(densityViewGroup);

    // image
    const texture = new THREE.TextureLoader().load('Media/grenouille-gaus.jpg');
    texture.minFilter = THREE.LinearFilter;
    texture.magFilter = THREE.LinearFilter;



    // point cloud geometry
    function makePointGeometry(width, height) {
      const positions = [];
      const uvs = [];

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const u = x / (width - 1);
          const v = y / (height - 1);

          positions.push(0, 0, 0);
          uvs.push(u, v);
        }
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geometry.setAttribute('aUV', new THREE.Float32BufferAttribute(uvs, 2));

      return geometry;
    }

    // point cloud material
    const pointMaterial = new THREE.ShaderMaterial({
      uniforms: {
        uTexture: { value: texture },
        uMode: { value: 0 }
      },
      vertexShader: `
        attribute vec2 aUV;
        varying vec3 vColor;

        ${shaderFunctions}

        void main() {
          vec3 rgb = sampleRGB(aUV);
          vColor = srgbToLinear(rgb);

          vec3 pos = getDistributionPosition(rgb);

          gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
          gl_PointSize = 4.0;
        }
      `,
      fragmentShader: `
        varying vec3 vColor;

        void main() {
          vec2 c = gl_PointCoord - vec2(0.5);

          if (dot(c, c) > 0.25) {
            discard;
          }

          gl_FragColor = vec4(vColor, 1.0);
        }
      `,
      transparent: true,
      depthWrite: false
    });

    // density cloud material
    const densityMaterial = new THREE.ShaderMaterial({
      uniforms: {
        uTexture: { value: texture },
        uMode: { value: 0 }
      },
      vertexShader: `
        attribute vec2 aUV;
        varying vec3 vColor;

        ${shaderFunctions}

        void main() {
          vec3 rgb = sampleRGB(aUV);
          vColor = srgbToLinear(rgb);

          vec3 pos = getDistributionPosition(rgb);
          vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);

          gl_Position = projectionMatrix * mvPosition;
          gl_PointSize = 18.0;
        }
      `,
      fragmentShader: `
        varying vec3 vColor;

        void main() {
          vec2 p = gl_PointCoord - vec2(0.5);
          float d = dot(p, p);

          if (d > 0.25) {
            discard;
          }

          float alpha = exp(-18.0 * d) * 0.08;
          gl_FragColor = vec4(vColor, alpha);
        }
      `,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });

    // objects
    const pointGeometry = makePointGeometry(180, 120);

    const points = new THREE.Points(pointGeometry, pointMaterial);
    points.frustumCulled = false;
    pointViewGroup.add(points);

    const densityPoints = new THREE.Points(pointGeometry, densityMaterial);
    densityPoints.frustumCulled = false;
    densityViewGroup.add(densityPoints);

    // update color space
    function updateMode() {
      const mode = parseInt(modeSelect.value);

      pointMaterial.uniforms.uMode.value = mode;
      densityMaterial.uniforms.uMode.value = mode;
    }

    modeSelect.addEventListener('change', updateMode);

    updateMode();

    // animation
    function animate() {
      requestAnimationFrame(animate);

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    // resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();

      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
